<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cloud GPTTa - Universal AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff; overflow: hidden; }
        
        .chat-container { width: 95%; max-width: 500px; height: 90vh; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        
        .chat-header { padding: 15px; background: rgba(0, 0, 0, 0.3); text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .chat-header h2 { font-size: 1.1rem; letter-spacing: 2px; }
        .chat-header span { color: #00d2ff; }

        /* Настройки ключа */
        .settings-bar { padding: 15px; background: rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .settings-row { display: flex; gap: 10px; }
        select, .key-input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px; border-radius: 8px; outline: none; font-size: 0.8rem; }
        .key-input { flex: 1; }
        .save-btn { background: #00d2ff; border: none; padding: 8px 15px; border-radius: 8px; color: #000; font-weight: bold; cursor: pointer; font-size: 0.8rem; }

        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .chat-box::-webkit-scrollbar { width: 5px; }
        .chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 0.9rem; line-height: 1.4; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: linear-gradient(135deg, #00d2ff, #3a7bd5); border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: rgba(255, 255, 255, 0.1); border-bottom-left-radius: 2px; }

        .input-area { padding: 20px; display: flex; background: rgba(0,0,0,0.2); gap: 10px; }
        #userInput { flex: 1; background: rgba(255,255,255,0.1); border: none; padding: 12px 18px; border-radius: 12px; color: white; outline: none; }
        #sendBtn { background: #00d2ff; border: none; width: 45px; height: 45px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        #sendBtn:hover { transform: scale(1.05); background: #33e0ff; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header"><h2>☁️ Cloud <span>GPTTa</span></h2></div>
    
    <div class="settings-bar">
        <div class="settings-row">
            <select id="modelSelect">
                <option value="openai">OpenAI (ChatGPT)</option>
                <option value="hf">Hugging Face (Llama 3)</option>
            </select>
            <input type="password" id="keyInput" class="key-input" placeholder="Вставь свой API ключ...">
            <button class="save-btn" onclick="saveConfig()">OK</button>
        </div>
        <div id="statusInfo" style="font-size: 0.7rem; color: #aaa; text-align: center;">Ключ не установлен</div>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="msg ai">Привет! Выбери модель, вставь свой ключ сверху и нажми OK. Я буду ждать! 🚀</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Напиши что-нибудь..." autocomplete="off">
        <button id="sendBtn">➤</button>
    </div>
</div>

<script>
    let currentKey = localStorage.getItem('chat_key') || "";
    let currentProvider = localStorage.getItem('chat_provider') || "openai";

    // Инициализация интерфейса
    if(currentKey) {
        document.getElementById('keyInput').value = "********";
        document.getElementById('modelSelect').value = currentProvider;
        document.getElementById('statusInfo').textContent = "Ключ сохранен локально ✅";
    }

    function saveConfig() {
        const key = document.getElementById('keyInput').value;
        const provider = document.getElementById('modelSelect').value;
        if (key && key !== "********") {
            localStorage.setItem('chat_key', key);
            currentKey = key;
        }
        localStorage.setItem('chat_provider', provider);
        currentProvider = provider;
        alert("Настройки сохранены!");
        document.getElementById('statusInfo').textContent = "Ключ обновлен ✅";
    }

    async function sendMessage() {
        const text = document.getElementById('userInput').value.trim();
        if (!text) return;
        if (!currentKey) return alert("Сначала введи API ключ!");

        addMsg(text, true);
        document.getElementById('userInput').value = '';

        const loader = Date.now();
        addMsg("Думаю...", false, loader);

        try {
            let aiResponse = "";
            if (currentProvider === "openai") {
                aiResponse = await callOpenAI(text);
            } else {
                aiResponse = await callHF(text);
            }
            document.getElementById(loader).remove();
            addMsg(aiResponse, false);
        } catch (e) {
            document.getElementById(loader).textContent = "Ошибка! Проверь VPN или ключ.";
        }
    }

    async function callOpenAI(text) {
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentKey}` },
            body: JSON.stringify({ 
                model: "gpt-4o-mini", 
                messages: [{role: "system", content: "Ты Cloud GPTTa."}, {role: "user", content: text}] 
            })
        });
        const data = await res.json();
        return data.choices[0].message.content;
    }

    async function callHF(text) {
        const res = await fetch("https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-8B-Instruct", {
            headers: { Authorization: `Bearer ${currentKey}`, "Content-Type": "application/json" },
            method: "POST",
            body: JSON.stringify({ inputs: `<|begin_of_text|><|start_header_id|>user<|end_header_id|>${text}<|eot_id|><|start_header_id|>assistant<|end_header_id|>` })
        });
        const data = await res.json();
        const raw = data[0].generated_text;
        return raw.split("assistant<|end_header_id|>").pop() || "Ошибка ответа";
    }

    function addMsg(t, u, id) {
        const d = document.createElement('div');
        d.className = `msg ${u ? 'user' : 'ai'}`;
        if(id) d.id = id;
        d.textContent = t;
        const box = document.getElementById('chatBox');
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('userInput').onkeypress = (e) => e.key === 'Enter' && sendMessage();
</script>
</body>
</html>
