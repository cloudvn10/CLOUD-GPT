<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud GPTTa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .chat-container {
            width: 90%;
            max-width: 450px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            text-align: center;
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .chat-header span {
            color: #00d2ff;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-box::-webkit-scrollbar {
            width: 6px;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-in-out;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            border-bottom-right-radius: 2px;
        }

        .ai-msg {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 2px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 12px 15px;
            border-radius: 10px;
            color: white;
            outline: none;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.5); }
        input:focus { background: rgba(255, 255, 255, 0.15); }

        button {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            border: none;
            color: white;
            padding: 0 20px;
            margin-left: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            ☁️ Cloud <span>GPTTa</span>
        </div>
        <div class="chat-box" id="chatBox">
            <div class="message ai-msg">Привет! Я Cloud GPTTa. Готов ответить на любые вопросы. Погнали! 🚀</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Напиши сообщение..." autocomplete="off">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        const API_KEY = "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"; 

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        let messageHistory = [
            {"role": "system", "content": "Ты Cloud GPTTa, умный и дружелюбный ИИ. Отвечай кратко, красиво и на русском языке."}
        ];

        function addMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(isUser ? 'user-msg' : 'ai-msg');
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            sendBtn.disabled = true;
            addMessage(text, true);
            
            messageHistory.push({"role": "user", "content": text});

            const loadingId = "loading-" + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.classList.add('message', 'ai-msg');
            loadingDiv.id = loadingId;
            loadingDiv.textContent = 'Думаю...';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: messageHistory,
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                
                document.getElementById(loadingId).remove();

                if (response.ok) {
                    const aiText = data.choices[0].message.content;
                    addMessage(aiText, false);
                    messageHistory.push({"role": "assistant", "content": aiText});
                } else {
                    addMessage("Ошибка API: " + (data.error?.message || "Неизвестная ошибка"), false);
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                addMessage("Ошибка соединения с интернетом.", false);
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
